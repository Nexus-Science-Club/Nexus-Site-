<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Nexus Science Club</title>
    <script>
      const segmentsToKeep = 1;
      const currentLocation = window.location;
      const redirectTarget =
        currentLocation.protocol +
        '//' +
        currentLocation.hostname +
        (currentLocation.port ? ':' + currentLocation.port : '') +
        currentLocation.pathname.split('/').slice(0, 1 + segmentsToKeep).join('/') +
        '/?/' +
        currentLocation.pathname
          .slice(1)
          .split('/')
          .slice(segmentsToKeep)
          .join('/')
          .replace(/&/g, '~and~') +
        (currentLocation.search ? '&' + currentLocation.search.slice(1).replace(/&/g, '~and~') : '') +
        currentLocation.hash;

      currentLocation.replace(redirectTarget);
    </script>
  </head>
  <body></body>
</html>
